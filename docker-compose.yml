services:
  microsoft365-mcp:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - MS365_AUTH_MODE=${MS365_AUTH_MODE:-oauth-proxy}
      - MS365_TENANT_ID=${MS365_TENANT_ID:-common}
      - MS365_CLIENT_ID=${MS365_CLIENT_ID:?MS365_CLIENT_ID is required}
      - MS365_CLIENT_SECRET=${MS365_CLIENT_SECRET:?MS365_CLIENT_SECRET is required}
      - MS365_OAUTH_BASE_URL=${MS365_OAUTH_BASE_URL:?MS365_OAUTH_BASE_URL is required}
      - MS365_ORG_MODE=${MS365_ORG_MODE:-false}
      - MS365_CONFIRM_WRITES=${MS365_CONFIRM_WRITES:-true}
      - MS365_PRESETS=${MS365_PRESETS:-}
      - MS365_READ_ONLY=${MS365_READ_ONLY:-false}
      - PORT=8080
      - TRANSPORT_TYPE=httpStream
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
